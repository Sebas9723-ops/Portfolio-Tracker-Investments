name: Daily Portfolio Report

on:
  schedule:
    # 13:00 UTC = 8:00 AM Colombia (UTC-5, no DST)
    - cron: '0 13 * * *'
  workflow_dispatch:   # allow manual trigger from GitHub Actions tab

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install --quiet \
            groq \
            yfinance \
            gspread \
            google-auth \
            reportlab \
            requests \
            pandas

      - name: Generate and send daily report
        env:
          GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
          SHEETS_SPREADSHEET_ID:    ${{ secrets.SHEETS_SPREADSHEET_ID }}
          SHEETS_WORKSHEET:         ${{ secrets.SHEETS_WORKSHEET }}
          GROQ_API_KEY:             ${{ secrets.GROQ_API_KEY }}
          PORTFOLIO_JSON:           ${{ secrets.PORTFOLIO_JSON }}
          TELEGRAM_BOT_TOKEN:       ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:         ${{ secrets.TELEGRAM_CHAT_ID }}
          BASE_CURRENCY:            ${{ secrets.BASE_CURRENCY }}
        run: python scripts/daily_report.py

      - name: Upload PDF artifact (30-day archive)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: portfolio-brief-${{ github.run_number }}
          path: /tmp/portfolio_brief_*.pdf
          retention-days: 30
